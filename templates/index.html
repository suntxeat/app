<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контейнеры</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
            color: #e6edf3;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #30363d;
        }
        .header {
            text-align: center;
            padding: 16px 0 24px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 3px;
            color: #f0f6fc;
        }
        .header h1 span { color: #58a6ff; }
        .status-bar {
            background: #0d1117;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #30363d;
            font-size: 0.9em;
        }
        .status-bar .round { color: #58a6ff; font-weight: 600; }
        .status-bar .player { color: #3fb950; font-weight: 600; }
        .status-bar .timer { color: #d29922; font-weight: 600; }
        .message-box {
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #0d1117;
            border-left: 3px solid #58a6ff;
            color: #8b949e;
            min-height: 44px;
            display: flex;
            align-items: center;
            font-size: 0.95em;
        }
        .message-box.success { border-left-color: #3fb950; color: #7ee787; }
        .message-box.error { border-left-color: #f85149; color: #ff7b72; }
        .message-box.warning { border-left-color: #d29922; color: #e3b341; }
        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .player-card {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #30363d;
            transition: border-color 0.3s;
        }
        .player-card.you { border-color: #58a6ff; }
        .player-card .name {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .player-card .name .badge {
            font-size: 0.7em;
            color: #58a6ff;
            background: #0d1117;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid #30363d;
        }
        .player-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        .stat {
            background: #161b22;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
        }
        .stat .label {
            font-size: 0.65em;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat .value {
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 2px;
        }
        .stat .value.chips { color: #3fb950; }
        .stat .value.score { color: #d29922; }
        .stat .value.hidden { color: #484f58; }
        .stat .value.containers { color: #58a6ff; }
        .containers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 26px;
            margin-top: 6px;
        }
        .container-tag {
            background: #161b22;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            border: 1px solid #30363d;
            color: #8b949e;
        }
        .container-tag.yours { border-color: #58a6ff; color: #58a6ff; }
        .container-tag.hidden { color: #484f58; font-style: italic; }
        .abilities {
            margin-top: 8px;
            font-size: 0.8em;
            color: #8b949e;
            display: flex;
            gap: 16px;
        }
        .abilities .used { color: #3fb950; }
        .abilities .available { color: #484f58; }
        .section-title {
            font-size: 0.9em;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .container-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin: 10px 0 16px;
        }
        .container-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        .container-item:hover { border-color: #58a6ff; transform: translateY(-2px); }
        .container-item .price {
            font-size: 1.4em;
            font-weight: 600;
            color: #3fb950;
        }
        .container-item .label {
            font-size: 0.7em;
            color: #8b949e;
            margin-top: 2px;
        }
        .container-item .hidden-label {
            font-size: 0.8em;
            color: #484f58;
            margin-top: 6px;
        }
        .container-item .btn-group {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .container-item .btn-group .btn { flex: 1; }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-secondary { background: #21262d; color: #c9d1d9; }
        .btn-warning { background: #d29922; color: #0d1117; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-purple { background: #8957e5; color: #fff; }
        .btn-pink { background: #f778ba; color: #0d1117; }
        .btn-success { background: #238636; color: #fff; }
        .btn-outline {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }
        .btn-outline:hover { border-color: #58a6ff; color: #58a6ff; }
        .actions-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .actions-group .btn {
            flex: 1;
            min-width: 90px;
            padding: 8px 14px;
            font-size: 0.85em;
        }
        .auction-box {
            background: #0d1117;
            border: 1px solid #d29922;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: #d29922; }
            50% { border-color: #da3633; }
        }
        .auction-box .title {
            font-size: 1.1em;
            font-weight: 600;
            color: #d29922;
            margin-bottom: 10px;
        }
        .auction-box .info { color: #8b949e; margin-bottom: 4px; }
        .auction-box .info strong { color: #f0f6fc; }
        .auction-box .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .auction-box .btn-group .btn {
            flex: 1;
            min-width: 70px;
            padding: 6px 12px;
            font-size: 0.8em;
        }
        .timer-bar {
            width: 100%;
            height: 3px;
            background: #161b22;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0 4px;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #d29922, #da3633);
            transition: width 1s linear;
        }
        .game-over {
            background: #0d1117;
            border: 1px solid #d29922;
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }
        .game-over .title {
            font-size: 1.6em;
            font-weight: 600;
            color: #d29922;
            margin-bottom: 10px;
        }
        .game-over .message { color: #8b949e; font-size: 1em; margin-bottom: 14px; }
        .game-over .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 12px 0;
        }
        .game-over .result-player {
            background: #161b22;
            padding: 14px;
            border-radius: 8px;
            text-align: left;
        }
        .game-over .result-player .name {
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 6px;
        }
        .game-over .result-player .detail {
            color: #8b949e;
            font-size: 0.85em;
            margin: 2px 0;
        }
        .game-over .result-player .detail strong { color: #f0f6fc; }
        .join-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .join-screen .title {
            font-size: 1.6em;
            font-weight: 300;
            color: #f0f6fc;
            margin-bottom: 8px;
        }
        .join-screen .subtitle { color: #8b949e; margin-bottom: 20px; }
        .join-screen .btn-group {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .join-screen .btn-group .btn {
            padding: 10px 28px;
            font-size: 1em;
            min-width: 100px;
        }
        .empty-state { color: #484f58; text-align: center; padding: 16px; font-style: italic; font-size: 0.9em; }
        @media (max-width: 768px) {
            .container { padding: 16px; }
            .players-grid { grid-template-columns: 1fr; }
            .container-grid { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 1.4em; }
            .status-bar { font-size: 0.75em; gap: 6px; }
            .game-over .result-details { grid-template-columns: 1fr; }
            .actions-group .btn { min-width: 70px; font-size: 0.75em; padding: 6px 10px; }
        }
        @media (max-width: 480px) {
            .container-grid { grid-template-columns: 1fr; }
            .player-stats { grid-template-columns: 1fr 1fr; }
            .header h1 { font-size: 1.2em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>КОНТ<span>ЕЙНЕРЫ</span></h1>
        </div>

        <div id="app">
            <!-- JOIN -->
            <div id="joinScreen" class="join-screen">
                <div class="title">Добро пожаловать</div>
                <div class="subtitle">Выберите игрока</div>
                <div class="btn-group">
                    <button class="btn btn-primary" onclick="joinGame('player1')">Игрок 1</button>
                    <button class="btn btn-secondary" onclick="joinGame('player2')">Игрок 2</button>
                </div>
                <div style="margin-top:16px;color:#484f58;font-size:0.8em;">Подключайтесь с разных устройств</div>
            </div>

            <!-- GAME -->
            <div id="gameScreen" style="display:none;">
                <div class="status-bar">
                    <span class="round" id="roundInfo">Раунд: 0 / 3</span>
                    <span class="player" id="playerInfo">Вы: --</span>
                    <span class="timer" id="timerDisplay">--</span>
                </div>

                <div class="message-box" id="messageBox">Загрузка...</div>

                <div class="players-grid">
                    <div class="player-card" id="player1Card">
                        <div class="name"><span id="p1Name">Игрок 1</span><span class="badge" id="p1Badge"></span></div>
                        <div class="player-stats">
                            <div class="stat"><div class="label">Фишки</div><div class="value chips" id="p1Chips">150</div></div>
                            <div class="stat"><div class="label">Очки</div><div class="value hidden" id="p1Score">?</div></div>
                            <div class="stat"><div class="label">Конт.</div><div class="value containers" id="p1Containers">0</div></div>
                        </div>
                        <div class="containers-list" id="p1ContainersList"></div>
                        <div class="abilities">
                            <span>Рентген: <span id="p1Xray">доступен</span></span>
                            <span>Перехват: <span id="p1Intercept">доступен</span></span>
                        </div>
                    </div>

                    <div class="player-card" id="player2Card">
                        <div class="name"><span id="p2Name">Игрок 2</span><span class="badge" id="p2Badge"></span></div>
                        <div class="player-stats">
                            <div class="stat"><div class="label">Фишки</div><div class="value chips" id="p2Chips">150</div></div>
                            <div class="stat"><div class="label">Очки</div><div class="value hidden" id="p2Score">?</div></div>
                            <div class="stat"><div class="label">Конт.</div><div class="value containers" id="p2Containers">0</div></div>
                        </div>
                        <div class="containers-list" id="p2ContainersList"></div>
                        <div class="abilities">
                            <span>Рентген: <span id="p2Xray">доступен</span></span>
                            <span>Перехват: <span id="p2Intercept">доступен</span></span>
                        </div>
                    </div>
                </div>

                <div id="containersArea">
                    <div class="section-title">Контейнеры на столе</div>
                    <div id="containersGrid" class="container-grid"></div>
                </div>

                <div id="auctionArea" style="display:none;">
                    <div class="auction-box">
                        <div class="title">АУКЦИОН</div>
                        <div id="auctionInfo" class="info"></div>
                        <div class="btn-group">
                            <button class="btn btn-warning" onclick="auctionAction('raise')">Повысить (+10)</button>
                            <button class="btn btn-danger" onclick="auctionAction('pass')">Пас</button>
                            <button class="btn btn-success" onclick="auctionAction('buy')">Купить</button>
                        </div>
                    </div>
                </div>

                <div class="actions-group">
                    <button class="btn btn-primary" onclick="startGame()" id="startBtn">Начать игру</button>
                    <button class="btn btn-success" onclick="nextRound()" id="nextRoundBtn" style="display:none;">Следующий раунд</button>
                    <button class="btn btn-purple" onclick="useIntercept()" id="interceptBtn">Перехват</button>
                    <button class="btn btn-pink" onclick="resetGame()" id="resetBtn">Новая игра</button>
                </div>

                <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>

                <div id="gameOverScreen" style="display:none;">
                    <div class="game-over">
                        <div class="title">ИГРА ОКОНЧЕНА</div>
                        <div class="message" id="gameOverMessage"></div>
                        <div class="result-details" id="resultDetails"></div>
                        <button class="btn btn-success" onclick="resetGame()" style="padding:8px 28px;font-size:0.95em;">Новая игра</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket = null, playerId = null, gameId = 'default', gameState = null, myContainers = [];

        function joinGame(pId) {
            playerId = pId;
            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';

            socket = io();

            socket.on('connect', function() {
                socket.emit('join_game', { game_id: gameId, player_id: playerId });
            });

            socket.on('player_assigned', function(data) {
                document.getElementById('playerInfo').textContent = 'Вы: ' + data.name;
                const card = document.getElementById(data.player_id + 'Card');
                if (card) card.classList.add('you');
                const badge = document.getElementById(data.player_id + 'Badge');
                if (badge) badge.textContent = 'вы';
            });

            socket.on('game_ready', function(data) {
                showMessage('success', data.message + ' Нажмите "Начать игру"');
                document.getElementById('startBtn').disabled = false;
            });

            socket.on('game_state', function(state) { updateGame(state); });

            socket.on('xray_result', function(data) {
                showMessage('success', 'Рентген: ' + data.type + ' (' + data.value + ' очков)');
            });

            socket.on('purchase_result', function(data) {
                showMessage('success', 'Вы купили: ' + data.type + ' (' + data.value + ' очков)');
                myContainers.push(data.type);
                updateMyContainers();
            });

            socket.on('intercept_result', function(data) {
                showMessage('success', 'Перехват: ' + data.type + ' (' + data.value + ' очков)');
                myContainers.push(data.type);
                updateMyContainers();
            });

            socket.on('error', function(data) { showMessage('error', data.message); });
            socket.on('player_disconnected', function(data) { showMessage('warning', data.player_id + ' отключился'); });
            socket.on('disconnect', function() { showMessage('error', 'Соединение потеряно'); });
        }

        function showMessage(type, text) {
            const box = document.getElementById('messageBox');
            box.textContent = text;
            box.className = 'message-box ' + type;
        }

        function updateMyContainers() {
            const prefix = playerId === 'player1' ? 'p1' : 'p2';
            const list = document.getElementById(prefix + 'ContainersList');
            list.innerHTML = '';
            if (myContainers.length === 0) {
                const span = document.createElement('span');
                span.className = 'empty-state';
                span.textContent = 'пусто';
                list.appendChild(span);
            } else {
                myContainers.forEach(c => {
                    const tag = document.createElement('span');
                    tag.className = 'container-tag yours';
                    tag.textContent = c;
                    list.appendChild(tag);
                });
            }
        }

        function updateGame(state) {
            gameState = state;
            document.getElementById('roundInfo').textContent = 'Раунд: ' + state.current_round + ' / ' + state.max_rounds;
            if (state.message) showMessage('info', state.message);

            updatePlayer('player1', state.players.player1);
            updatePlayer('player2', state.players.player2);
            updateContainers(state.containers);

            // Аукцион
            if (state.auction_active) {
                document.getElementById('auctionArea').style.display = 'block';
                const a = state.auction;
                let timeLeft = state.auction_time_remaining ? Math.ceil(state.auction_time_remaining) : 0;
                document.getElementById('auctionInfo').innerHTML = `
                    <div>Ставка: <strong>${a.current_price}</strong> фишек</div>
                    <div>Повышений: ${a.raise_count} / ${a.max_raises}</div>
                    <div>${a.current_bidder ? 'Лидер: ' + state.players[a.current_bidder].name : 'Ожидание'}</div>
                    <div style="color:#484f58;font-size:0.8em;margin-top:4px;">⏱️ ${timeLeft}с</div>
                `;
            } else {
                document.getElementById('auctionArea').style.display = 'none';
            }

            // Таймер
            if (state.time_remaining !== undefined && !state.round_ended) {
                const pct = (state.time_remaining / 30) * 100;
                document.getElementById('timerFill').style.width = pct + '%';
                document.getElementById('timerDisplay').textContent = Math.ceil(state.time_remaining) + 'с';
            } else if (state.round_ended) {
                document.getElementById('timerDisplay').textContent = '✅';
            }

            // Game Over
            if (state.game_over) {
                document.getElementById('gameOverScreen').style.display = 'block';
                document.getElementById('gameOverMessage').textContent = state.message;
                const details = document.getElementById('resultDetails');
                details.innerHTML = `
                    <div class="result-player">
                        <div class="name">${state.players.player1.name}</div>
                        <div class="detail">Контейнеров: <strong>${state.players.player1.containers_count}</strong></div>
                        <div class="detail">Очки: <strong>${state.players.player1.score}</strong></div>
                        <div class="detail">Фишки: <strong>${state.players.player1.chips}</strong></div>
                        <div class="detail">Контейнеры: <strong>${state.players.player1.containers.join(', ') || 'нет'}</strong></div>
                    </div>
                    <div class="result-player">
                        <div class="name">${state.players.player2.name}</div>
                        <div class="detail">Контейнеров: <strong>${state.players.player2.containers_count}</strong></div>
                        <div class="detail">Очки: <strong>${state.players.player2.score}</strong></div>
                        <div class="detail">Фишки: <strong>${state.players.player2.chips}</strong></div>
                        <div class="detail">Контейнеры: <strong>${state.players.player2.containers.join(', ') || 'нет'}</strong></div>
                    </div>
                `;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('interceptBtn').disabled = true;
                document.getElementById('nextRoundBtn').style.display = 'none';
            } else {
                document.getElementById('gameOverScreen').style.display = 'none';
            }

            // Следующий раунд
            if (state.waiting_for_next && !state.game_over) {
                document.getElementById('nextRoundBtn').style.display = 'block';
            } else {
                document.getElementById('nextRoundBtn').style.display = 'none';
            }

            // Перехват
            const you = state.players[playerId];
            if (you) {
                document.getElementById('interceptBtn').disabled = you.used_intercept || state.game_over || !state.started;
            }
            document.getElementById('resetBtn').disabled = false;
        }

        function updatePlayer(id, data) {
            const prefix = id === 'player1' ? 'p1' : 'p2';
            const isYou = id === playerId;

            document.getElementById(prefix + 'Name').textContent = data.name;
            document.getElementById(prefix + 'Chips').textContent = data.chips;

            const scoreEl = document.getElementById(prefix + 'Score');
            if (gameState && gameState.game_over) {
                scoreEl.textContent = data.score;
                scoreEl.className = 'value score';
            } else {
                scoreEl.textContent = '?';
                scoreEl.className = 'value hidden';
            }
            document.getElementById(prefix + 'Containers').textContent = data.containers_count;

            // Контейнеры
            const list = document.getElementById(prefix + 'ContainersList');
            list.innerHTML = '';
            if (isYou) {
                if (myContainers.length === 0) {
                    const span = document.createElement('span');
                    span.className = 'empty-state';
                    span.textContent = 'пусто';
                    list.appendChild(span);
                } else {
                    myContainers.forEach(c => {
                        const tag = document.createElement('span');
                        tag.className = 'container-tag yours';
                        tag.textContent = c;
                        list.appendChild(tag);
                    });
                }
            } else {
                if (data.containers_count > 0) {
                    const tag = document.createElement('span');
                    tag.className = 'container-tag hidden';
                    tag.textContent = 'скрыто (' + data.containers_count + ' шт.)';
                    list.appendChild(tag);
                } else {
                    const span = document.createElement('span');
                    span.className = 'empty-state';
                    span.textContent = 'пусто';
                    list.appendChild(span);
                }
            }

            // Способности
            const xEl = document.getElementById(prefix + 'Xray');
            const iEl = document.getElementById(prefix + 'Intercept');
            xEl.textContent = data.used_xray ? 'использован' : 'доступен';
            xEl.className = data.used_xray ? 'used' : 'available';
            iEl.textContent = data.used_intercept ? 'использован' : 'доступен';
            iEl.className = data.used_intercept ? 'used' : 'available';
        }

        function updateContainers(containers) {
            const grid = document.getElementById('containersGrid');
            grid.innerHTML = '';
            if (!containers || containers.length === 0) {
                const div = document.createElement('div');
                div.className = 'empty-state';
                div.textContent = 'Нет доступных контейнеров';
                grid.appendChild(div);
                return;
            }
            containers.forEach(c => {
                const div = document.createElement('div');
                div.className = 'container-item';
                div.innerHTML = `
                    <div class="price">${c.price}</div>
                    <div class="label">фишек</div>
                    <div class="hidden-label">содержимое скрыто</div>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="buyContainer(${c.id})">Купить</button>
                        <button class="btn btn-secondary" onclick="useXray(${c.id})">Рентген</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function startGame() { socket.emit('start_game', {}); document.getElementById('startBtn').disabled = true; }
        function buyContainer(id) { socket.emit('buy_container', { player_id: playerId, container_id: id }); }
        function useXray(id) { socket.emit('use_xray', { player_id: playerId, container_id: id }); }
        function useIntercept() { socket.emit('use_intercept', { player_id: playerId }); }
        function auctionAction(action) { socket.emit('auction_bid', { player_id: playerId, action: action }); }
        function nextRound() { socket.emit('next_round', {}); }
        
        function resetGame() {
            if (confirm('Начать новую игру?')) {
                myContainers = [];
                socket.emit('reset_game', {});
                document.getElementById('gameOverScreen').style.display = 'none';
                document.getElementById('startBtn').disabled = true;
                document.getElementById('interceptBtn').disabled = false;
                document.getElementById('nextRoundBtn').style.display = 'none';
                showMessage('info', 'Новая игра');
                setTimeout(() => location.reload(), 500);
            }
        }

        document.getElementById('startBtn').disabled = true;
    </script>
</body>
</html>
