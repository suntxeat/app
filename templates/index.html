<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контейнеры</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
            color: #e6edf3;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #161b22;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #30363d;
        }
        .header {
            text-align: center;
            padding: 16px 0 24px;
            border-bottom: 1px solid #30363d;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 3px;
            color: #f0f6fc;
        }
        .header h1 span { color: #58a6ff; }
        .status-bar {
            background: #0d1117;
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            border: 1px solid #30363d;
            font-size: 0.9em;
        }
        .status-bar .round { color: #58a6ff; font-weight: 600; }
        .status-bar .player { color: #3fb950; font-weight: 600; }
        .status-bar .timer { color: #d29922; font-weight: 600; }
        .message-box {
            padding: 10px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            background: #0d1117;
            border-left: 3px solid #58a6ff;
            color: #8b949e;
            min-height: 44px;
            display: flex;
            align-items: center;
            font-size: 0.95em;
        }
        .message-box.success { border-left-color: #3fb950; color: #7ee787; }
        .message-box.error { border-left-color: #f85149; color: #ff7b72; }
        .message-box.warning { border-left-color: #d29922; color: #e3b341; }
        .players-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .player-card {
            background: #0d1117;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #30363d;
            transition: border-color 0.3s;
        }
        .player-card.you { border-color: #58a6ff; }
        .player-card .name {
            font-size: 1em;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .player-card .name .badge {
            font-size: 0.7em;
            color: #58a6ff;
            background: #0d1117;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: 8px;
            border: 1px solid #30363d;
        }
        .player-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        .stat {
            background: #161b22;
            padding: 6px;
            border-radius: 6px;
            text-align: center;
        }
        .stat .label {
            font-size: 0.65em;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .stat .value {
            font-size: 1.2em;
            font-weight: 600;
            margin-top: 2px;
        }
        .stat .value.chips { color: #3fb950; }
        .stat .value.score { color: #d29922; }
        .stat .value.hidden { color: #484f58; }
        .stat .value.containers { color: #58a6ff; }
        .containers-list {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            min-height: 26px;
            margin-top: 6px;
        }
        .container-tag {
            background: #161b22;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.75em;
            border: 1px solid #30363d;
            color: #8b949e;
        }
        .container-tag.yours { border-color: #58a6ff; color: #58a6ff; }
        .container-tag.hidden { color: #484f58; font-style: italic; }
        .abilities {
            margin-top: 8px;
            font-size: 0.8em;
            color: #8b949e;
            display: flex;
            gap: 16px;
        }
        .abilities .used { color: #3fb950; }
        .abilities .available { color: #484f58; }
        .section-title {
            font-size: 0.9em;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .container-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin: 10px 0 16px;
        }
        .container-item {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
            transition: all 0.3s;
        }
        .container-item:hover { border-color: #58a6ff; transform: translateY(-2px); }
        .container-item .price {
            font-size: 1.4em;
            font-weight: 600;
            color: #3fb950;
        }
        .container-item .label {
            font-size: 0.7em;
            color: #8b949e;
            margin-top: 2px;
        }
        .container-item .hidden-label {
            font-size: 0.8em;
            color: #484f58;
            margin-top: 6px;
        }
        .container-item .btn-group {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }
        .container-item .btn-group .btn { flex: 1; }
        .btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-secondary { background: #21262d; color: #c9d1d9; }
        .btn-warning { background: #d29922; color: #0d1117; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-purple { background: #8957e5; color: #fff; }
        .btn-pink { background: #f778ba; color: #0d1117; }
        .btn-success { background: #238636; color: #fff; }
        .btn-outline {
            background: transparent;
            color: #8b949e;
            border: 1px solid #30363d;
        }
        .btn-outline:hover { border-color: #58a6ff; color: #58a6ff; }
        .actions-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 12px 0;
        }
        .actions-group .btn {
            flex: 1;
            min-width: 90px;
            padding: 8px 14px;
            font-size: 0.85em;
        }
        .auction-box {
            background: #0d1117;
            border: 1px solid #d29922;
            border-radius: 12px;
            padding: 16px;
            margin: 12px 0;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { border-color: #d29922; }
            50% { border-color: #da3633; }
        }
        .auction-box .title {
            font-size: 1.1em;
            font-weight: 600;
            color: #d29922;
            margin-bottom: 10px;
        }
        .auction-box .info { color: #8b949e; margin-bottom: 4px; }
        .auction-box .info strong { color: #f0f6fc; }
        .auction-box .btn-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        .auction-box .btn-group .btn {
            flex: 1;
            min-width: 70px;
            padding: 6px 12px;
            font-size: 0.8em;
        }
        .timer-bar {
            width: 100%;
            height: 3px;
            background: #161b22;
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0 4px;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #238636, #d29922, #da3633);
            transition: width 1s linear;
        }
        .game-over {
            background: #0d1117;
            border: 1px solid #d29922;
            border-radius: 12px;
            padding: 20px;
            margin: 16px 0;
            text-align: center;
        }
        .game-over .title {
            font-size: 1.6em;
            font-weight: 600;
            color: #d29922;
            margin-bottom: 10px;
        }
        .game-over .message { color: #8b949e; font-size: 1em; margin-bottom: 14px; }
        .game-over .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin: 12px 0;
        }
        .game-over .result-player {
            background: #161b22;
            padding: 14px;
            border-radius: 8px;
            text-align: left;
        }
        .game-over .result-player .name {
            font-weight: 600;
            color: #f0f6fc;
            margin-bottom: 6px;
        }
        .game-over .result-player .detail {
            color: #8b949e;
            font-size: 0.85em;
            margin: 2px 0;
        }
        .game-over .result-player .detail strong { color: #f0f6fc; }
        .join-screen {
            text-align: center;
            padding: 40px 20px;
        }
        .join-screen .title {
            font-size: 1.6em;
            font-weight: 300;
            color: #f0f6fc;
            margin-bottom:
